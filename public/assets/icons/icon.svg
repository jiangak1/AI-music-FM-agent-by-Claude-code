<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Radio waves -->
  <g transform="translate(256,200)" fill="none" stroke="#e43f5a" stroke-width="8" stroke-linecap="round">
    <path d="M-80,0 Q0,-40 80,0" opacity="0.3"/>
    <path d="M-120,0 Q0,-80 120,0" opacity="0.5"/>
    <path d="M-160,0 Q0,-120 160,0" opacity="0.8"/>
  </g>
  <!-- Center dot -->
  <circle cx="256" cy="200" r="16" fill="#e43f5a"/>
  <!-- Text -->
  <text x="256" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="48" font-weight="700" fill="#e0e0e0">AI 电台</text>
  <text x="256" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" fill="#9090a0">AI RADIO</text>
  <!-- Frequency -->
  <text x="256" y="450" text-anchor="middle" font-family="monospace" font-size="32" fill="#e43f5a" letter-spacing="4">102.4</text>
</svg>
